<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #1a1a1a;
    }
    #status {
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 12px;
      line-height: 1.4;
    }
    #status.success { background: #e8f5e9; color: #2e7d32; }
    #status.partial { background: #fff3e0; color: #e65100; }
    #status.error { background: #ffebee; color: #c62828; }
    #status.empty { background: #f5f5f5; color: #666; }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:disabled {
      background: #bdbdbd !important;
      cursor: not-allowed;
    }
    #quickBtn {
      background: #1976d2;
    }
    #quickBtn:hover:not(:disabled) { background: #1565c0; }
    #fullBtn {
      background: #7b1fa2;
    }
    #fullBtn:hover:not(:disabled) { background: #6a1b9a; }
    #backfillBtn {
      background: #2e7d32;
    }
    #backfillBtn:hover:not(:disabled) { background: #1b5e20; }
    #marketNewsBtn {
      background: #00838f;
    }
    #marketNewsBtn:hover:not(:disabled) { background: #006064; }
    #marketNewsCatchupBtn {
      background: #00695c;
    }
    #marketNewsCatchupBtn:hover:not(:disabled) { background: #004d40; }
    .btn-hint {
      font-size: 10px;
      color: #999;
      text-align: center;
      margin-bottom: 8px;
    }
    #progress {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      display: none;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0 10px 0;
      padding: 8px;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 12px;
      color: #444;
    }
    .toggle-row label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toggle-row small {
      color: #777;
      font-size: 11px;
    }
    .toggle-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .toggle-row select {
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      color: #444;
      font-size: 12px;
      padding: 4px 6px;
    }
  </style>
</head>
<body>
  <h2>SA Alpha Picks</h2>
  <div id="status" class="empty">No data yet. Click a button below.</div>
  <div id="marketNewsStatus" class="empty">Market News: not synced yet.</div>
  <div class="btn-row">
    <button id="quickBtn">Quick Refresh</button>
    <button id="fullBtn">Full Scan</button>
  </div>
  <div class="btn-row">
    <button id="backfillBtn">Deep Backfill</button>
    <button id="marketNewsBtn">News Quick</button>
  </div>
  <div class="btn-row">
    <button id="marketNewsCatchupBtn">News Catchup</button>
  </div>
  <div class="toggle-row">
    <label for="alphaPicksAutoSyncToggle">
      <span>Auto-sync Alpha Picks</span>
      <small>Runs quick refresh on the selected interval when enabled</small>
    </label>
    <div class="toggle-controls">
      <select id="alphaPicksAutoSyncInterval">
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="60">60 min</option>
      </select>
      <input id="alphaPicksAutoSyncToggle" type="checkbox">
    </div>
  </div>
  <div class="toggle-row">
    <label for="marketNewsAutoSyncToggle">
      <span>Auto-sync Market News</span>
      <small>Auto uses observed ET publish-density windows, not a fixed market-hours rule</small>
    </label>
    <div class="toggle-controls">
      <select id="marketNewsAutoSyncInterval">
        <option value="auto">Auto</option>
        <option value="5">5 min</option>
        <option value="15">15 min</option>
        <option value="60">60 min</option>
      </select>
      <input id="marketNewsAutoSyncToggle" type="checkbox">
    </div>
  </div>
  <div id="marketNewsAutoSyncResolved" class="btn-hint" style="margin-top: -4px; margin-bottom: 8px;"></div>
  <div class="btn-hint">Quick: recent updates &nbsp;|&nbsp; Full: balanced scan &nbsp;|&nbsp; Backfill: overnight comments &nbsp;|&nbsp; News Catchup: latest + backlog</div>
  <div id="progress"></div>
  <div id="manualSection" style="display:none; margin-top: 10px; border-top: 1px solid #ddd; padding-top: 10px;">
    <div style="font-size: 12px; color: #666; margin-bottom: 6px;">Paste missing article URLs (TICKER URL per line):</div>
    <textarea id="manualInput" rows="3" style="width: 100%; font-size: 11px; font-family: monospace; padding: 4px; border: 1px solid #ccc; border-radius: 4px; resize: vertical;"></textarea>
    <button id="manualBtn" style="margin-top: 6px; background: #ef6c00; font-size: 12px; padding: 7px;">Fetch Manual</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
