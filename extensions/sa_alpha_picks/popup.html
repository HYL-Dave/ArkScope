<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #1a1a1a;
    }
    #status {
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 12px;
      line-height: 1.4;
    }
    #status.success { background: #e8f5e9; color: #2e7d32; }
    #status.partial { background: #fff3e0; color: #e65100; }
    #status.error { background: #ffebee; color: #c62828; }
    #status.empty { background: #f5f5f5; color: #666; }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #1976d2;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #1565c0; }
    button:disabled {
      background: #bdbdbd;
      cursor: not-allowed;
    }
    #progress {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      display: none;
    }
  </style>
</head>
<body>
  <h2>SA Alpha Picks</h2>
  <div id="status" class="empty">No data yet. Click Refresh.</div>
  <button id="refreshBtn">Refresh All</button>
  <div id="progress"></div>
  <script src="popup.js"></script>
</body>
</html>
