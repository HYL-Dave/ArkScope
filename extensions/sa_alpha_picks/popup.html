<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 12px;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #333;
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #1a1a1a;
    }
    #status {
      margin-bottom: 12px;
      padding: 8px;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 12px;
      line-height: 1.4;
    }
    #status.success { background: #e8f5e9; color: #2e7d32; }
    #status.partial { background: #fff3e0; color: #e65100; }
    #status.error { background: #ffebee; color: #c62828; }
    #status.empty { background: #f5f5f5; color: #666; }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
    }
    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:disabled {
      background: #bdbdbd !important;
      cursor: not-allowed;
    }
    #quickBtn {
      background: #1976d2;
    }
    #quickBtn:hover:not(:disabled) { background: #1565c0; }
    #fullBtn {
      background: #7b1fa2;
    }
    #fullBtn:hover:not(:disabled) { background: #6a1b9a; }
    #backfillBtn {
      background: #2e7d32;
    }
    #backfillBtn:hover:not(:disabled) { background: #1b5e20; }
    #marketNewsBtn {
      background: #00838f;
    }
    #marketNewsBtn:hover:not(:disabled) { background: #006064; }
    #marketNewsCatchupBtn {
      background: #00695c;
    }
    #marketNewsCatchupBtn:hover:not(:disabled) { background: #004d40; }
    .btn-hint {
      font-size: 10px;
      color: #999;
      text-align: center;
      margin-bottom: 8px;
    }
    #progress {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      display: none;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0 10px 0;
      padding: 8px;
      border-radius: 4px;
      background: #f5f5f5;
      font-size: 12px;
      color: #444;
    }
    .toggle-row label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toggle-row small {
      color: #777;
      font-size: 11px;
    }
    .toggle-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    .toggle-row select {
      border: 1px solid #ccc;
      border-radius: 4px;
      background: white;
      color: #444;
      font-size: 12px;
      padding: 4px 6px;
    }
    #reconciliationSection {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid #ddd;
    }
    .reconciliation-heading {
      margin-bottom: 4px;
      font-size: 13px;
      font-weight: 600;
      color: #222;
    }
    #reconciliationError,
    .reconciliation-action-error {
      margin: 6px 0;
      color: #c62828;
      font-size: 11px;
      line-height: 1.4;
    }
    .reconciliation-summary,
    .reconciliation-event-meta,
    .reconciliation-event-reason,
    .reconciliation-candidate-details,
    .reconciliation-evidence,
    .reconciliation-candidate-reason,
    .reconciliation-no-candidate {
      color: #666;
      font-size: 11px;
      line-height: 1.4;
    }
    .reconciliation-event {
      padding: 8px 0;
      border-bottom: 1px solid #e5e5e5;
    }
    .reconciliation-event-title {
      font-weight: 600;
      color: #333;
    }
    .reconciliation-candidate {
      margin-top: 7px;
      padding-left: 8px;
      border-left: 2px solid #d7d7d7;
      min-width: 0;
    }
    .reconciliation-candidate-title {
      display: block;
      color: #1565c0;
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }
    .reconciliation-candidate-details,
    .reconciliation-candidate-actions,
    .reconciliation-confirm-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }
    .reconciliation-content-state {
      font-weight: 600;
      color: #444;
    }
    .reconciliation-candidate-actions button,
    .reconciliation-confirm-actions button,
    #manualBtn {
      flex: 0 1 auto;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 11px;
    }
    .reconciliation-use,
    .reconciliation-confirm {
      background: #1976d2;
    }
    .reconciliation-reject,
    .reconciliation-cancel {
      background: #666;
    }
    .reconciliation-confirmation {
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid #f0b36a;
    }
    .reconciliation-warning {
      color: #b45309;
      font-size: 11px;
      line-height: 1.4;
    }
    #manualAdvanced {
      margin-top: 10px;
      color: #555;
      font-size: 11px;
    }
    #manualAdvanced summary {
      cursor: pointer;
      font-size: 12px;
      color: #444;
    }
    #manualAdvanced label {
      display: block;
      margin: 7px 0 4px;
      line-height: 1.4;
    }
    #manualInput {
      width: 100%;
      box-sizing: border-box;
      padding: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      resize: vertical;
      font-family: monospace;
      font-size: 11px;
    }
    #manualBtn {
      margin-top: 6px;
      background: #ef6c00;
    }
  </style>
</head>
<body>
  <h2>SA Alpha Picks</h2>
  <div id="status" class="empty">No data yet. Click a button below.</div>
  <div id="marketNewsStatus" class="empty">Market News: not synced yet.</div>
  <div class="btn-row">
    <button id="quickBtn">Quick Refresh</button>
    <button id="fullBtn">Full Scan</button>
  </div>
  <div class="btn-row">
    <button id="backfillBtn">Deep Backfill</button>
    <button id="marketNewsBtn">News Quick</button>
  </div>
  <div class="btn-row">
    <button id="marketNewsCatchupBtn">News Catchup</button>
  </div>
  <div class="toggle-row">
    <label for="alphaPicksAutoSyncToggle">
      <span>Auto-sync Alpha Picks</span>
      <small>Runs quick refresh on the selected interval when enabled</small>
    </label>
    <div class="toggle-controls">
      <select id="alphaPicksAutoSyncInterval">
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="60">60 min</option>
      </select>
      <input id="alphaPicksAutoSyncToggle" type="checkbox">
    </div>
  </div>
  <div class="toggle-row">
    <label for="marketNewsAutoSyncToggle">
      <span>Auto-sync Market News</span>
      <small>Auto uses observed ET publish-density windows, not a fixed market-hours rule</small>
    </label>
    <div class="toggle-controls">
      <select id="marketNewsAutoSyncInterval">
        <option value="auto">Auto</option>
        <option value="5">5 min</option>
        <option value="15">15 min</option>
        <option value="60">60 min</option>
      </select>
      <input id="marketNewsAutoSyncToggle" type="checkbox">
    </div>
  </div>
  <div id="marketNewsAutoSyncResolved" class="btn-hint" style="margin-top: -4px; margin-bottom: 8px;"></div>
  <div class="btn-hint">Quick: recent updates &nbsp;|&nbsp; Full: balanced scan &nbsp;|&nbsp; Backfill: overnight comments &nbsp;|&nbsp; News Catchup: latest + backlog</div>
  <div id="progress"></div>
  <section id="reconciliationSection">
    <div class="reconciliation-heading">Article link review</div>
    <div id="reconciliationError" hidden></div>
    <div id="reconciliationQueue">Loading events to review...</div>
    <div id="manualConfirmation"></div>
    <details id="manualAdvanced">
      <summary>Advanced: specify article URLs</summary>
      <label for="manualInput">One per line: TICKER ROLE DATE ARTICLE_URL</label>
      <textarea id="manualInput" rows="3"></textarea>
      <button id="manualBtn">Fetch and review</button>
    </details>
  </section>
  <script src="reconciliation_ui.js"></script>
  <script src="popup.js"></script>
</body>
</html>
