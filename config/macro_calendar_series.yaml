# P1.2 Curated FRED series catalog (v1, 2026-04-26).
#
# See docs/design/P1_2_SPEC.md §10 for the rationale behind this list.
# Each entry maps a FRED series_id to its revision strategy and (for
# `latest_only` series) the FRED `release_id` whose schedule supplies
# `realtime_start` for our observations.
#
# Strategies:
#   latest_only    — store one row per (series_id, observation_date),
#                    realtime_start derived from release_date join.
#                    Suitable for non-revising monthly / daily series.
#   full_vintages  — request explicit vintage_dates from ALFRED so each
#                    revision gets its own realtime window. Used for
#                    actively revised series (GDP, BEA NIPA, payrolls).
#
# release_id reference:
#   10  Consumer Price Index (CPI-U)
#   53  Selected Interest Rates (H.15)            — DGS2, DGS10, T10Y2Y
#   86  Federal Funds Effective Rate              — FEDFUNDS
#   50  Employment Situation                      — UNRATE, PAYEMS
#   53  H.15 also covers VIXCLS? No — VIXCLS is a CBOE series; FRED
#       publishes it under a separate release that we leave blank for v1
#       and look up at ingest time.
#
# When release_id is null / missing, the latest_only ingestion path
# logs and skips rows whose realtime_start can't be derived (spec §3.2 —
# no sentinel writes).

series:
  # --- Inflation ---
  - id: CPIAUCNS
    revision_strategy: latest_only
    release_id: 10
    description: Consumer Price Index for All Urban Consumers, All Items, NSA

  - id: CPILFESL
    revision_strategy: latest_only
    release_id: 10
    description: CPI for All Urban Consumers, All Items Less Food and Energy, SA

  # --- Policy / rates ---
  - id: FEDFUNDS
    revision_strategy: latest_only
    release_id: 101
    description: Effective Federal Funds Rate (monthly)

  - id: DGS10
    revision_strategy: latest_only
    release_id: 18
    description: 10-Year Treasury Constant Maturity Rate

  - id: DGS2
    revision_strategy: latest_only
    release_id: 18
    description: 2-Year Treasury Constant Maturity Rate

  - id: T10Y2Y
    revision_strategy: latest_only
    release_id: 18
    description: 10-Year Treasury Minus 2-Year Treasury (term spread)

  # --- Labour ---
  - id: UNRATE
    revision_strategy: latest_only
    release_id: 50
    description: Unemployment Rate

  - id: PAYEMS
    revision_strategy: full_vintages
    release_id: 50
    description: All Employees, Total Nonfarm (payrolls; actively revised)

  # --- Output ---
  - id: GDP
    revision_strategy: full_vintages
    release_id: 53
    description: Gross Domestic Product, nominal (BEA, actively revised)

  - id: GDPC1
    revision_strategy: full_vintages
    release_id: 53
    description: Real Gross Domestic Product (BEA, actively revised)

  # --- Volatility ---
  - id: VIXCLS
    revision_strategy: latest_only
    release_id: null
    description: CBOE Volatility Index (VIX) close. release_id resolved at ingest time.

# Operational defaults applied to every series unless overridden inline.
defaults:
  observation_start: '1990-01-01'   # plenty of history; FRED handles older series gracefully
  release_date_lookback_years: 50   # enough to cover every observation we ingest