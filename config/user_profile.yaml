# MindfulRL User Profile Configuration
# 個人化設定檔 - 根據個人需求調整
#
# 使用方式:
#   1. 複製此檔案為 user_profile.local.yaml
#   2. 根據需求修改
#   3. .local.yaml 不會被 git 追蹤

# ============================================
# 1. 基本資料
# ============================================
profile:
  name: "default"
  created: "2026-01-27"
  timezone: "Asia/Taipei"

# ============================================
# 2. 投資偏好
# ============================================
investment_preferences:
  # 風險承受度 (1-10, 1=極保守, 10=極激進)
  risk_tolerance: 6

  # 投資風格
  style:
    primary: "growth"        # growth | value | momentum | swing | day_trade
    secondary: "momentum"

  # 持倉時間偏好
  holding_period:
    min_days: 1              # 最短持有天數
    target_days: 30          # 目標持有天數
    max_days: 180            # 最長持有天數

  # 部位大小偏好 (相對於投資組合)
  position_sizing:
    max_single_position_pct: 15    # 單一標的最大佔比
    max_sector_exposure_pct: 30    # 單一板塊最大佔比

# ============================================
# 3. 自訂觀察清單
# ============================================
watchlists:
  # 核心持倉 (優先監控)
  core_holdings:
    description: "目前持有的股票"
    tickers: ["ZETA", "NVDA", "AMD"]
    priority: "high"

  # 關注清單
  interested:
    description: "有興趣但還沒買入"
    tickers: ["RKLB", "PLTR", "COIN", "PYPL"]
    priority: "medium"

  # 板塊觀察
  sector_watch:
    description: "追蹤特定板塊"
    sectors: ["SPACE", "AI_CHIPS", "FINTECH"]
    priority: "medium"

  # 自訂主題
  custom_themes:
    - name: "量子計算"
      tickers: ["IONQ", "RGTI", "QBTS", "IBM", "GOOGL"]
      reason: "長期看好量子計算發展"

    - name: "AI 基礎設施"
      tickers: ["NVDA", "AMD", "SMCI", "DELL", "ANET"]
      reason: "AI 需要的硬體供應鏈"

    - name: "Fintech"
      tickers: ["PYPL", "XYZ", "AFRM", "COIN"]
      reason: "金融科技板塊追蹤"

# ============================================
# 4. 策略權重配置
# ============================================
strategy_weights:
  # 決策時各因素的權重 (總和應為 100)

  # 動量策略 (適合短線)
  momentum:
    price_trend: 35
    volume_confirmation: 25
    technical_indicators: 25
    news_sentiment: 15

  # 事件驅動策略 (適合財報季)
  event_driven:
    upcoming_events: 30
    news_sentiment: 30
    options_flow: 25
    historical_reaction: 15

  # 價值投資策略 (適合長線)
  value:
    fundamentals: 40
    valuation: 30
    insider_activity: 15
    dividend_yield: 15

  # 我的自訂混合策略
  my_custom:
    fundamentals: 25
    price_trend: 25
    news_sentiment: 25
    options_flow: 25

  # 預設使用的策略
  default_strategy: "my_custom"

# ============================================
# 5. 警報設定
# ============================================
alerts:
  # 價格警報
  price_alerts:
    enabled: true
    # 單日漲跌幅警報
    daily_change_threshold_pct: 5
    # 週漲跌幅警報
    weekly_change_threshold_pct: 10

  # 新聞情緒警報
  sentiment_alerts:
    enabled: true
    # 情緒分數突變 (24小時內變化)
    sentiment_change_threshold: 1.5  # 1-5 scale
    # 新聞數量激增
    news_volume_spike_multiplier: 3  # 相比平均

  # Options Flow 警報
  options_alerts:
    enabled: true
    # 大單門檻
    large_order_threshold_usd: 500000
    # 異常 IV 變化
    iv_change_threshold_pct: 20

  # 板塊警報
  sector_alerts:
    enabled: true
    # N 支股票同向異動觸發
    sector_sync_threshold: 3
    # 板塊內平均漲跌幅
    sector_avg_change_threshold_pct: 3

  # 通知方式
  notification_channels:
    - type: "log"          # 記錄到檔案
      enabled: true
    - type: "console"      # 終端輸出
      enabled: true
    - type: "discord"       # Discord Bot 推送 (Phase E2)
      enabled: false       # 啟用前確保 DISCORD_BOT_TOKEN 已設定
    - type: "telegram"     # Telegram 推送
      enabled: false
      bot_token: ""
      chat_id: ""
    - type: "email"        # Email 通知
      enabled: false
      smtp_server: ""
      recipient: ""

# ============================================
# 6. 數據取得偏好
# ============================================
data_preferences:
  # 新聞來源優先順序
  news_sources:
    - source: "supabase"    # 自建 DB (已評分)
      priority: 1
    - source: "ibkr"        # IBKR 即時
      priority: 2
    - source: "finnhub"     # Finnhub 免費
      priority: 3
    - source: "polygon"     # Polygon (歷史)
      priority: 4

  # 價格數據來源
  price_sources:
    realtime: "ibkr"        # 即時用 IBKR
    historical: "local"     # 歷史用本地 Parquet
    fallback: "tiingo"      # 備用

  # 基本面數據來源
  fundamentals_sources:
    primary: "local_ibkr"          # 本地 IBKR JSON
    secondary: "sec_edgar"         # SEC 官方 (免費)
    tertiary: "financial_datasets" # 付費 fallback (有快取)
    refresh_days: 7                # 超過 N 天重新抓取

  # 付費數據源控制
  paid_sources:
    financial_datasets:
      enabled: true                # false = 完全不呼叫
      cache_days_annual: 180       # 年報快取天數
      cache_days_quarterly: 90     # 季報快取天數

  # API 成本控制
  cost_control:
    daily_budget_usd: 1.0   # 每日 API 成本上限
    prefer_cached: true     # 優先使用快取
    cache_ttl_minutes: 60   # 快取有效時間

# ============================================
# 7. Options 數據偏好
# ============================================
options_preferences:
  # 是否啟用 Options 數據收集
  enabled: true

  # 歷史數據收集頻率
  historical_interval: "15 mins"  # 1 min, 5 mins, 15 mins, 1 hour, 1 day

  # 數據類型
  what_to_show: "TRADES"  # TRADES, MIDPOINT, BID, ASK

  # 預設篩選條件 (用於 filter_interesting_options)
  default_filter:
    # Strike 篩選 (相對於現價的百分比範圍)
    strike_range_pct: 0.10      # ±10% ATM

    # 到期日篩選 (天數)
    min_dte: 7                  # 最少 7 天到期
    max_dte: 60                 # 最多 60 天到期

    # 合約類型
    rights: ["C", "P"]          # Call 和 Put 都收集

    # 流動性篩選 (可選)
    min_open_interest: 100      # 最小未平倉量
    min_volume: 10              # 最小日成交量

  # 特定感興趣的合約 (手動指定)
  # 這些會額外收集，不受 default_filter 限制
  specific_contracts:
    # 範例：NVDA 的特定合約
    # - underlying: "NVDA"
    #   expiry: "20260220"
    #   strike: 150.0
    #   right: "C"

  # 要收集 Options 數據的標的清單
  # 如果為空，會使用 watchlists.core_holdings
  tickers_for_options: ["NVDA", "AMD", "PLTR", "PYPL", "ZETA", "RKLB", "COIN"]
  # 或者指定：
  # tickers_for_options: ["NVDA", "AMD", "AAPL"]

# ============================================
# 8. LLM 評分偏好
# ============================================
llm_preferences:
  # 情緒評分模型
  sentiment_model: "gpt-5.4"
  # 風險評分模型
  risk_model: "gpt-5.4"
  # 使用 batch API (更便宜但較慢)
  use_batch_api: true
  # 每日 token 預算
  daily_token_budget: 100000

  # 查詢時的模型優先順序 (越前面越優先)
  # 用於自動選擇最佳評分：如果文章有多個模型的分數，按此順序取第一個可用的
  # 模型名用 column suffix 格式 (gpt-5.2 → gpt_5_2)
  model_priority:
    - "gpt_5_4"
    - "gpt_5_4_mini"
    - "gpt_5_4_nano"
    - "gpt_5_2"
    - "gpt_5"

  # ── Anthropic agent 設定 (Phase 8) ──
  # Effort (Opus 4.7 / Sonnet 4.6, 不需 beta header)
  # "max" (Opus 4.7 only) | "high" (default) | "medium" | "low"
  # anthropic_effort: "high"

  # Extended thinking (所有 Claude 模型)
  # 開啟後 max_tokens 和 budget_tokens 全自動推導：
  #   - max_tokens = 模型最大 output (Opus 4.7: 128K, 其他: 64K)
  #   - Opus 4.7: adaptive 模式 (Claude 自動調配，不需 budget)
  #   - 其他模型: budget = max_output - max_tokens (留 max_tokens 給 response)
  # anthropic_thinking: false

  # Data freshness in system prompt (default: false)
  # false = freshness only via check_data_freshness tool (preserves prompt cache hit rate)
  # true = inject freshness summary into system prompt (reduces cache hit rate)
  # freshness_in_prompt: false

  # ── 1M Context (Anthropic: Opus 4.7 + Sonnet 4.6) ──
  # 2026-03 起 1M context 為 GA，標準定價，不加價，不需 beta header
  # extended_context 設定僅影響舊模型（Sonnet 4.5 等），4.6 預設即為 1M
  # extended_context: false

  # ── Subagent 模型覆寫 (Phase 6) ──
  # 可覆寫每個 subagent 的預設模型。不設定的 subagent 使用內建預設值。
  # 也可用 CLI: /subagent code_analyst opus（會自動存到 user_profile.local.yaml）
  # 預設值：
  #   code_analyst:    gpt-5.4        (reasoning=xhigh)
  #   deep_researcher: gpt-5.4        (reasoning=xhigh)
  #   data_summarizer: claude-opus-4-7
  #
  # subagent_models:
  #   code_analyst: "claude-opus-4-7"
  #   deep_researcher: "claude-opus-4-7"

  # Subagent max_turns 覆蓋（每個 role 的工具呼叫次數上限）
  # 預設值: code_analyst=8, deep_researcher=10, data_summarizer=6, reviewer=4
  # subagent_max_turns:
  #   deep_researcher: 15
  #   code_analyst: 12

  # ── Code Generation Backend ──
  # 選擇代碼生成的執行路徑。CLI backends 失敗時自動 fallback 到 API。
  #   api          — 直接 API 呼叫 (預設，按 token 計費)
  #   codex        — Codex CLI + OAuth 訂閱 (ChatGPT Pro/Plus 額度)
  #   codex-apikey — Codex CLI + API key (品質提升，API 計費)
  #   claude       — Claude Code CLI + OAuth 訂閱 (Max Plan 額度)
  #   claude-apikey— Claude Code CLI + API key (品質提升，API 計費)
  # code_backend: api

# ============================================
# 9. Agent Context Management
# ============================================
context_management:
  # 觸發 context 壓縮的閾值比例
  # 當 input_tokens > 模型上下文極限 * threshold_ratio 時觸發
  # 較高的值 = 更晚觸發，保留更完整的上下文供分析
  # 較低的值 = 更早壓縮，更保守地使用上下文空間
  threshold_ratio: 0.7

  # 永遠保留最近 N 輪完整內容（每輪 = 1 assistant + 1 tool_result）
  # 只有超過此輪數的舊 tool_result 才可能被壓縮
  keep_recent_turns: 2

  # 壓縮後保留的內容預覽字元數
  preview_chars: 200

  # 參考：各模型上下文極限（2026-03 更新）
  # ┌─────────────────────────────────┬─────────────────┬────────────┐
  # │ 模型                           │ Context          │ Max Output │
  # ├─────────────────────────────────┼─────────────────┼────────────┤
  # │ claude-opus-4-7                 │ 1M (GA)         │ 128K       │
  # │ claude-sonnet-4-6               │ 1M (GA)         │ 64K        │
  # │ gpt-5.4                         │ 1M (>272K 加價) │ 128K       │
  # │ gpt-5.4-mini                    │ 400K            │ 128K       │
  # │ gpt-5.4-nano                    │ 400K            │ 128K       │
  # └─────────────────────────────────┴─────────────────┴────────────┘
  #
  # 觸發閾值範例 (threshold_ratio=0.7):
  #   claude-opus-4-7:  700K tokens 時觸發 (1M context)
  #   gpt-5.4:          700K tokens 時觸發 (1M context)
  #
  # 壓縮邏輯：
  #   1. 條件: turn_count > keep_recent_turns AND input_tokens > threshold
  #   2. 對象: 只壓縮舊的 tool_result (ephemeral)
  #   3. 保留: user question + assistant text + 最近 N 輪 (persistent)
  #   4. 格式: [Compacted] tool_name(params) → N chars. Preview: ...

# ============================================
# 10. 報告偏好
# ============================================
report_preferences:
  # 每日摘要
  daily_summary:
    enabled: true
    time: "08:00"           # 每日生成時間
    include_holdings: true
    include_watchlist: true
    include_sector_performance: true

  # 週報
  weekly_report:
    enabled: true
    day: "sunday"
    include_performance_review: true
    include_upcoming_events: true

  # 輸出格式
  format: "markdown"        # markdown | html | json
  save_to: "reports/"       # 儲存位置

# ============================================
# 11. Web Search 設定 (Phase 10)
# ============================================
web_search:
  # Tavily（免費 1000 credits/月，API key from TAVILY_API_KEY env）
  tavily: true

  # Claude 原生 web search（$10/1K searches，只對 Anthropic agent 有效）
  # 預設關閉，需要時手動開啟或用 CLI toggle
  claude_search: false
  claude_search_max_uses: 5    # 每次對話上限

  # OpenAI SDK WebSearchTool（包含在 API 費用，只對 OpenAI agent 有效）
  openai_search: true

  # Playwright headless browser（免費，需要 playwright install chromium）
  playwright: true

  # 信任的金融來源（可選，agent 會優先考慮這些來源）
  # trusted_domains:
  #   - "sec.gov"
  #   - "reuters.com"
  #   - "bloomberg.com"
  #   - "wsj.com"
  #   - "seekingalpha.com"
  #   - "finance.yahoo.com"

# ============================================
# 12. Seeking Alpha Alpha Picks (Phase 11c)
# ============================================
seeking_alpha:
  # 啟用 SA Alpha Picks 工具 (需安裝 Chrome extension，見 extensions/sa_alpha_picks/)
  enabled: true

  # Portfolio 快取有效小時數 (超過則自動 refresh)
  cache_hours: 24

  # Detail 報告快取天數
  detail_cache_days: 7

  # 留言快取天數 (Full Scan 時 TTL 過期的留言會重抓)
  comments_cache_days: 7

# ============================================
# 13. RL Pipeline 設定
# ============================================
rl_pipeline:
  # 是否啟用 RL 模型工具（需要先有已訓練的模型）
  # false = 工具回傳「尚未啟用」的提示訊息，不載入 PyTorch
  # true  = 工具讀取 models_dir 的模型狀態和回測結果（推論功能待 Phase 1b 實作）
  enabled: false

# ============================================
# 14. Analysis Pipeline 設定
# ============================================
analysis_pipeline:
  # Phase D 結構化分析管線
  # false = /analyze 指令回傳「尚未啟用」提示
  # true  = 啟用 /analyze 和 /analyze-save 指令
  enabled: true

  # 已訓練模型的存放目錄（相對於專案根目錄）
  models_dir: "trained_models"