# MindfulRL-Intraday: PostgreSQL + pgvector
#
# Usage:
#   docker compose up -d              # Start (default port 15432)
#   POSTGRES_PORT=25432 docker compose up -d  # Custom port
#
# Schema is auto-initialized from ../sql/ on first startup.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mindfulrl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindfulrl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindfulrl_dev_2026}
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindfulrl"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: mindfulrl_pgdata