# ArkScope: PostgreSQL + pgvector — ARCHIVE ACCESS ONLY.
#
# The app runtime does NOT use PostgreSQL (local-first SQLite/DuckDB). This
# compose exists solely to restore/inspect `data/pg_archive/*` dumps. See
# docker/README.md.
#
# Usage:
#   ARKSCOPE_ARCHIVE_PG_PASSWORD=... docker compose up -d   # default port 15432
#   POSTGRES_PORT=25432 ARKSCOPE_ARCHIVE_PG_PASSWORD=... docker compose up -d
#
# Schema is auto-initialized from ../sql/ on first startup.

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mindfulrl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mindfulrl
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${ARKSCOPE_ARCHIVE_PG_PASSWORD:?set ARKSCOPE_ARCHIVE_PG_PASSWORD to run the archive DB}
    ports:
      - "0.0.0.0:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mindfulrl"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: mindfulrl_pgdata